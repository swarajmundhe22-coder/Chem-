name = "agon-portfolio"
type = "javascript"
compatibility_date = "2024-01-01"

# Build configuration
[build]
command = "npm run build"
cwd = "./"
watch_paths = ["src/**/*.tsx", "src/**/*.ts", "src/**/*.css", "api/**/*.js"]

[build.upload]
format = "modules"
main = "./api"

# Environment variables for production
[env.production]
routes = [
  { pattern = "designarena.ai/*", custom_domain = true },
  { pattern = "*.designarena.ai/*", custom_domain = true }
]
vars = { ENVIRONMENT = "production" }

[env.production.build]
command = "npm run build"

# Development environment
[env.development]
routes = [
  { pattern = "localhost:8000/*" }
]
vars = { ENVIRONMENT = "development" }

